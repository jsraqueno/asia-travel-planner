<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#070712;--card:#0e0e22;--card2:#141430;--border:#1e1e3a;--border2:#2a2a4a;
  --accent:#7c3aed;--soft:#a78bfa;--glow:rgba(124,58,237,.15);
  --teal:#0891b2;--tealS:#22d3ee;--green:#059669;--greenS:#34d399;
  --yellow:#d97706;--yellowS:#fbbf24;--red:#dc2626;--redS:#f87171;
  --orange:#ea580c;--orangeS:#fb923c;--pink:#be185d;--pinkS:#f472b6;
  --text:#f1f5f9;--muted:#8892aa;--faint:#25254a;
  --korea:#0ea5e9;--china:#ef4444;--japan:#ec4899;--thailand:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
/* HEADER */
#hdr{background:linear-gradient(135deg,#08081a 0%,#130826 50%,#08081a 100%);border-bottom:1px solid var(--border2);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:17px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-stats{display:flex;gap:14px;margin-top:10px;justify-content:space-around}
.hdr-stat{text-align:center}
.hdr-n{font-size:14px;font-weight:800;color:var(--soft)}
.hdr-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
/* TABS */
#tabnav{display:flex;gap:4px;padding:8px 10px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:88px;z-index:99}
#tabnav::-webkit-scrollbar{display:none}
.tbtn{padding:7px 13px;border-radius:9px;border:none;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:all .2s;flex-shrink:0}
.tbtn.on{background:linear-gradient(135deg,var(--accent),#4c1d95);color:#fff;box-shadow:0 3px 10px rgba(124,58,237,.4)}
.tbtn.off{background:transparent;color:var(--muted)}
/* MAIN */
#main{padding:14px;max-width:900px;margin:0 auto;padding-bottom:60px}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card2{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:12px}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:500px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.g3,.g4{grid-template-columns:1fr}}
/* INPUTS */
input,textarea,select{background:#050510;border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 12px;font-size:14px;outline:none;width:100%;font-family:inherit;box-sizing:border-box}
textarea{resize:vertical;min-height:65px}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
select option{background:#0e0e22}
.lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;display:block}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:9px;border:none;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.8}
.bp{background:linear-gradient(135deg,var(--accent),#4c1d95);color:#fff;box-shadow:0 3px 10px rgba(124,58,237,.3)}
.bg{background:linear-gradient(135deg,var(--green),#064e3b);color:#fff}
.br{background:linear-gradient(135deg,var(--red),#7f1d1d);color:#fff}
.bo{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.bsm{padding:5px 10px;font-size:11px;border-radius:7px}
/* PILL */
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;white-space:nowrap}
/* BAR */
.bar-w{height:6px;border-radius:6px;background:var(--faint);overflow:hidden}
.bar-f{height:100%;border-radius:6px;transition:width .5s}
/* SECTION */
.stitle{font-size:14px;font-weight:800;margin-bottom:12px}
/* ROW ITEM */
.ri{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:11px;border:1px solid var(--border);background:var(--card);margin-bottom:7px}
.ri.done-row{opacity:.55}
/* DAY BADGE */
.dbadge{background:linear-gradient(135deg,var(--accent),#4c1d95);color:#fff;border-radius:7px;padding:3px 12px;font-size:11px;font-weight:800;flex-shrink:0;box-shadow:0 2px 8px rgba(124,58,237,.35)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:998;display:none}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);padding:20px 16px 32px;z-index:999;display:none;max-height:90vh;overflow-y:auto;max-width:640px;margin:0 auto}
.modal.show,.overlay.show{display:block}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px}
/* FILTER CHIPS */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:6px 13px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap}
.chip.on{background:rgba(124,58,237,.18);border-color:var(--accent);color:var(--soft)}
/* TIMELINE */
.tl-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;margin-top:2px}
/* COUNTRY COLORS */
.ck{color:var(--korea)}.cc{color:var(--china)}.cj{color:var(--japan)}.ct{color:var(--thailand)}
/* EMPTY STATE */
.empty{text-align:center;padding:28px 16px;color:var(--muted);font-size:13px}
/* ADD ROW FORM */
.add-form{background:linear-gradient(135deg,rgba(124,58,237,.08),transparent);border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:14px;margin-bottom:14px}
/* STAT MINI */
.smi{text-align:center;background:var(--card2);border-radius:10px;padding:12px 8px;border:1px solid var(--border)}
.smi-v{font-size:18px;font-weight:800;color:var(--soft)}
.smi-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
/* SCROLL HINT */
.scroll-x{overflow-x:auto;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}
/* NOTES BOX */
.sa-item{padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:var(--card2);margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.sa-item:active{opacity:.8}
.sa-item.selected{border-color:var(--accent);background:rgba(124,58,237,.15)}
.notes-box{font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:7px;margin-top:7px;white-space:pre-wrap;line-height:1.6}

#auth-screen{position:fixed;inset:0;background:#070712;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#0e0e22;border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:36px 28px;width:100%;max-width:380px;text-align:center}
.auth-icon{font-size:48px;margin-bottom:14px}
.auth-title{font-size:22px;font-weight:900;margin-bottom:6px;color:#e2e2f0}
.auth-sub{font-size:13px;color:#6b7280;margin-bottom:28px;line-height:1.5}
.auth-google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:#fff;color:#1f2937;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px}
.auth-google-btn:active{background:#f3f4f6}
.auth-err{color:#f87171;font-size:13px;margin-top:10px;min-height:18px}
.auth-loading{color:#a78bfa;font-size:13px;margin-top:10px}


.sg-arrow{display:none}
@media(hover:hover){.sg-arrow{display:flex !important}}

</style>
</head>

let S=(()=>{
  try{
    const d=localStorage.getItem('asiatrip26v3');
    if(!d)return JSON.parse(JSON.stringify(DEFAULTS));
    const loaded=JSON.parse(d);
    // Merge any new default fields that didn't exist in old saves
    const merged={...JSON.parse(JSON.stringify(DEFAULTS)),...loaded};
    // Ensure filter fields always exist
    if(!merged.foodFilter)merged.foodFilter='All';
    if(!merged.todoFilter)merged.todoFilter='All';
    if(!merged.hotelFilter)merged.hotelFilter='All';
    if(!merged.shopFilter)merged.shopFilter='All';
    if(!merged.schedGroup)merged.schedGroup='Seoul – Arrival (Apr 28–30)';
    if(!Array.isArray(merged.sched))merged.sched=[];
    return merged;
  }
  catch(e){return JSON.parse(JSON.stringify(DEFAULTS));}
})();

function save(){try{localStorage.setItem('asiatrip26v3',JSON.stringify(S));}catch(e){}try{if(window._fbSave)window._fbSave();}catch(e){}}
function resetAll(){if(window.confirm('Reset ALL data to defaults?')){localStorage.removeItem('asiatrip26v3');S=JSON.parse(JSON.stringify(DEFAULTS));renderAll();}}
function uid(){return Date.now()+Math.random().toString(36).slice(2);}

let modalCallback=null;
function openModal(title,bodyHtml,saveFn){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  modalCallback=saveFn;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('modal').classList.remove('show');
  modalCallback=null;
  window._modalCb=null;
}
function modalSave(){if(typeof _modalCb!=="undefined"&&_modalCb)_modalCb();else if(modalCallback)modalCallback();}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function gc(id){const el=document.getElementById(id);return el?el.checked:false;}

// ════════════════════════════════════════════════
function pill(t,c,bg){return`<span class="pill" style="background:${bg||c+'22'};color:${c};border:1px solid ${c}44">${t}</span>`;}
function bar(p,c,h=6){const pct=Math.min(p,100);const col=p>100?'var(--red)':p>80?'var(--yellow)':c;return`<div class="bar-w" style="height:${h}px"><div class="bar-f" style="width:${pct}%;background:${col}"></div></div>`;}
function cc(country){return CC[country]||'var(--soft)';}
function cf(country){return CF[country]||'🌍';}
function fmtCAD(v){return'$'+Number(v||0).toFixed(2);}
function rowBtns(delFn,editFn){return`<div style="display:flex;gap:5px;flex-shrink:0"><button class="btn bo bsm" onclick="${editFn}">Edit</button><button class="btn br bsm" onclick="${delFn}">✕</button></div>`;}


function cityChips(filterKey, setter, items, getCityFn) {
  const cities = ['All', ...[...new Set(items.map(getCityFn).filter(Boolean))].sort()];
  return `<div class="chips" style="margin-bottom:12px">${cities.map(c => `<button class="chip ${S[filterKey]===c?'on':''}" onclick="${setter}('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('')}</div>`;
}
function escHTML(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toggleSchedDone(id){S.sched=S.sched.map(s=>s.id===id?{...s,done:!s.done}:s);save();renderMain();}

// ─── SMART ADD ────────────────────────────────
let _sa={day:0,date:'',dow:'',group:'',city:'',country:'',tab:'activities',sel:null,startTime:'',endTime:''};

function openSmartAdd(day,date,dow){
  const grp=SCHED_GROUPS.find(g=>g.name===S.schedGroup)||SCHED_GROUPS[0];
  const group=grp.name, city=grp.city, country=grp.country;
  _sa={day,date,dow,group,city,country,tab:'activities',sel:null,startTime:'9:00 AM',endTime:''};
  document.getElementById('modal-title').textContent='➕ Add to Day '+day+' — '+city+' · '+date;
  document.getElementById('modal-body').innerHTML=smartAddBody();
  document.getElementById('modal-btns').style.display='flex';
  window._modalCb=doSmartSave;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('modal').classList.add('show');
}

function smartAddBody(){
  const tab=_sa.tab;const city=_sa.city;
  let actItems=S.todos.filter(t=>!t.done&&t.city===city);
  if(!actItems.length)actItems=S.todos.filter(t=>!t.done&&t.country===_sa.country);
  let foodItems=S.food.filter(f=>f.city===city);
  if(!foodItems.length)foodItems=S.food.filter(f=>f.country===_sa.country);
  let shopItems=S.shopping.filter(s=>s.city===city);
  const timeOpts=TIME_OPTIONS.map(t=>`<option ${_sa.startTime===t?'selected':''}>${t}</option>`).join('');
  const endOpts='<option value="">TBD</option>'+TIME_OPTIONS.map(t=>`<option ${_sa.endTime===t?'selected':''}>${t}</option>`).join('')+'<option value="END">END of day</option>';
  let listHTML='';
  const sel=_sa.sel;
  if(tab==='activities'){
    listHTML=actItems.length?actItems.map(t=>{const isSel=sel&&sel.srcId==t.id&&sel.srcType==='activity';return`<div class="sa-item${isSel?' selected':''}" onclick="saPickItem('activity','${t.id}')"><div style="font-weight:700;font-size:13px">${t.activity}</div><div style="font-size:11px;color:var(--muted)">${t.cat}${t.city?' · '+t.city:''} ${t.duration?'· '+t.duration+'h':''}</div>${t.bestTime?`<div style="font-size:10px;color:var(--tealS)">⏰ Best: ${t.bestTime}</div>`:''}${t.mustBook?`<div style="font-size:10px;color:var(--redS)">📋 Book first!</div>`:''}</div>`;}).join(''):`<div class="empty" style="padding:16px 0">No activities for ${city} yet.<br>Add them in <b>To Do</b> tab!</div>`;
  } else if(tab==='food'){
    listHTML=foodItems.length?foodItems.map(f=>{const isSel=sel&&sel.srcId==f.id&&sel.srcType==='food';return`<div class="sa-item${isSel?' selected':''}" onclick="saPickItem('food','${f.id}')"><div style="font-weight:700;font-size:13px">${f.mustTry?'⭐ ':''}${f.name}</div><div style="font-size:11px;color:var(--orangeS)">${f.cuisine}</div>${f.address?`<div style="font-size:10px;color:var(--muted)">📍 ${f.address}</div>`:''}</div>`;}).join(''):`<div class="empty" style="padding:16px 0">No food spots for ${city} yet.<br>Add them in <b>Food</b> tab!</div>`;
  } else if(tab==='shopping'){
    listHTML=shopItems.length?shopItems.map(s=>{const isSel=sel&&sel.srcId==s.id&&sel.srcType==='shopping';return`<div class="sa-item${isSel?' selected':''}" onclick="saPickItem('shopping','${s.id}')"><div style="font-weight:700;font-size:13px">${s.item}</div><div style="font-size:11px;color:var(--muted)">${s.cat||''}${s.where?' @ '+s.where:''}</div></div>`;}).join(''):`<div class="empty" style="padding:16px 0">No shopping items for ${city}.<br>Add them in <b>Shopping</b> tab!</div>`;
  }
  return`
    <div class="g2" style="gap:8px;margin-bottom:14px">
      <div><label class="lbl">Start Time</label><select id="sa-start" onchange="_sa.startTime=this.value">${timeOpts}</select></div>
      <div><label class="lbl">End Time</label><select id="sa-end" onchange="_sa.endTime=this.value">${endOpts}</select></div>
    </div>
    <div style="margin-bottom:10px">
      <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Pick from saved items · ${city}</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
        ${[['activities','🎯 Activities'],['food','🍜 Food'],['shopping','🛍️ Shopping'],['manual','✏️ Manual']].map(([t,lbl])=>`<button onclick="saSetTab('${t}')" style="padding:6px 12px;border-radius:8px;border:1px solid ${tab===t?'var(--accent)':'var(--border2)'};background:${tab===t?'rgba(124,58,237,.2)':'transparent'};color:${tab===t?'var(--soft)':'var(--muted)'};font-size:11px;font-weight:700;cursor:pointer">${lbl}</button>`).join('')}
      </div>
      ${tab!=='manual'?`<div style="max-height:180px;overflow-y:auto">${listHTML}</div>`:''}
    </div>
    <div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.25);border-radius:10px;padding:12px">
      <div style="font-size:10px;color:var(--soft);font-weight:700;text-transform:uppercase;margin-bottom:10px">Entry Details ${sel?'<span style=\"color:var(--greenS)\">✓ Auto-filled</span>':''}</div>
      <div style="margin-bottom:8px"><label class="lbl">Activity / Name *</label><input id="sa-act" placeholder="What are you doing?" value="${sel?sel.name.replace(/"/g,'&quot;'):''}"></div>
      <div class="g2" style="gap:8px;margin-bottom:8px">
        <div><label class="lbl">Category</label><select id="sa-cat">${['Activities','Food','Shopping','Transit','Lodging','Sightseeing','Concert','Nature','Other'].map(c=>`<option ${sel&&sel.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label class="lbl">Currency</label><select id="sa-cur">${S.fx.map(f=>`<option>${f.code}</option>`).join('')}</select></div>
      </div>
      <div style="margin-bottom:8px"><label class="lbl">Cost (Local)</label><input id="sa-costl" type="number" value="${sel?sel.cost:0}"></div>
      <div style="margin-bottom:8px"><label class="lbl">Notes / Address</label><textarea id="sa-notes" style="min-height:50px">${sel?(sel.notes||'').replace(/</g,'&lt;'):''}</textarea></div>
      <div style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="sa-res" ${sel&&sel.reservation?'checked':''}><label style="font-size:12px;color:var(--muted)">Has Reservation?</label></div>
    </div>`;
}

function saSetTab(tab){
  _sa.startTime=document.getElementById('sa-start')?.value||_sa.startTime;
  _sa.endTime=document.getElementById('sa-end')?.value||_sa.endTime;
  _sa.tab=tab;
  document.getElementById('modal-body').innerHTML=smartAddBody();
}

function saPickItem(type,id){
  _sa.startTime=document.getElementById('sa-start')?.value||_sa.startTime;
  _sa.endTime=document.getElementById('sa-end')?.value||_sa.endTime;
  let sel=null;
  if(type==='activity'){const t=S.todos.find(t=>t.id==id);if(t){const cm={Sightseeing:'Sightseeing',Activities:'Activities',Nature:'Nature',Beach:'Activities',Concert:'Concert','Food/Market':'Food',Shopping:'Shopping',Other:'Other'};sel={srcId:t.id,srcType:'activity',name:t.activity,cat:cm[t.cat]||'Activities',cost:t.costLocal||0,cur:t.cur||'KRW',notes:t.notes||'',reservation:t.mustBook||false};}}
  else if(type==='food'){const f=S.food.find(f=>f.id==id);if(f){sel={srcId:f.id,srcType:'food',name:f.name,cat:'Food',cost:f.estSpend||0,cur:f.cur||'KRW',notes:(f.address?'📍 '+f.address:'')+(f.notes?'\n'+f.notes:''),reservation:f.reservation||false};}}
  else if(type==='shopping'){const s=S.shopping.find(s=>s.id==id);if(s){sel={srcId:s.id,srcType:'shopping',name:s.item+(s.where?' @ '+s.where:''),cat:'Shopping',cost:s.priceLocal||0,cur:s.cur||'CAD',notes:s.notes||'',reservation:false};}}
  if(sel){_sa.sel=sel;document.getElementById('modal-body').innerHTML=smartAddBody();}
}

function doSmartSave(){
  const act=document.getElementById('sa-act')?.value?.trim();
  if(!act){alert('Please enter an activity name!');return;}
  const cur=document.getElementById('sa-cur')?.value||'KRW';
  const rate=(S.fx.find(f=>f.code===cur)||{rate:1}).rate;
  const costL=Number(document.getElementById('sa-costl')?.value||0);
  const cat=document.getElementById('sa-cat')?.value||'Activities';
  const res=document.getElementById('sa-res')?.checked||false;
  const notes=document.getElementById('sa-notes')?.value||'';
  const start=document.getElementById('sa-start')?.value||'9:00 AM';
  const end=document.getElementById('sa-end')?.value||'';
  S.sched.push({id:uid(),group:_sa.group,day:_sa.day,date:_sa.date,city:_sa.city,start,end:end||'TBD',cat,activity:act,costLocal:costL,cur,costCad:Math.round(costL*rate*100)/100,reservation:res,done:false,notes});
  save();closeModal();renderMain();
}

function cvConvert(){
  const amt=Number(document.getElementById('cv-amt')?.value||0);
  const fromCode=document.getElementById('cv-from')?.value||'CAD';
  const fromRate=(S.fx.find(f=>f.code===fromCode)||{rate:1}).rate;
  const amtCad=amt*fromRate;
  const res=document.getElementById('cv-results');
  if(!res)return;
  res.innerHTML=S.fx.filter(f=>f.code!==fromCode).map(f=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:9px;background:var(--card2);border:1px solid var(--border2)">
      <span style="font-weight:600;font-size:13px">${f.code} <span style="color:var(--muted);font-size:11px">${f.name}</span></span>
      <span style="font-weight:800;font-size:14px;color:var(--soft)">${f.rate>0?(amtCad/f.rate).toLocaleString(undefined,{maximumFractionDigits:f.code==='KRW'||f.code==='JPY'?0:2}):0} ${f.code}</span>
    </div>`).join('');
}

function editFxRate(id){
  const f=S.fx.find(f=>f.id==id);if(!f)return;
  openModal('Edit FX Rate',`
    <div style="margin-bottom:8px"><label class="lbl">Currency Code</label><input id="fxf-code" value="${f.code}"></div>
    <div style="margin-bottom:8px"><label class="lbl">Name</label><input id="fxf-name" value="${f.name}"></div>
    <div><label class="lbl">CAD per 1 unit</label><input id="fxf-rate" type="number" step="0.0001" value="${f.rate}"></div>
  `,()=>{
    S.fx=S.fx.map(fx=>fx.id==id?{...fx,code:gv('fxf-code'),name:gv('fxf-name'),rate:Number(gv('fxf-rate'))}:fx);
    save();closeModal();renderMain();
  });
}

function addFxRate(){
  openModal('Add FX Rate',`
    <div style="margin-bottom:8px"><label class="lbl">Currency Code (e.g. THB)</label><input id="fxf-code"></div>
    <div style="margin-bottom:8px"><label class="lbl">Name</label><input id="fxf-name"></div>
    <div><label class="lbl">CAD per 1 unit</label><input id="fxf-rate" type="number" step="0.0001"></div>
  `,()=>{
    S.fx.push({id:uid(),code:gv('fxf-code'),name:gv('fxf-name'),rate:Number(gv('fxf-rate'))});
    save();closeModal();renderMain();
  });
}

(function() {

    messagingSenderId:"902226769030",
    appId:"1:902226769030:web:8c14406657376c01458d07"
  };

  var db = null;
  var appShown = false;

  function isAllowed(email) {
    return ALLOWED.map(function(e){return e.toLowerCase();})
                  .indexOf((email||'').toLowerCase()) !== -1;
  }

  function showApp() {
    if (appShown) return;
    appShown = true;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('hdr').style.display = '';
    document.getElementById('tabnav').style.display = '';
    document.getElementById('main').style.display = '';
    try { renderAll(); } catch(e) { console.error('renderAll failed:', e); }
  }

  function showAuth(msg) {
    appShown = false;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('hdr').style.display = 'none';
    document.getElementById('tabnav').style.display = 'none';
    document.getElementById('main').style.display = 'none';
    document.getElementById('auth-loading').textContent = '';
    document.getElementById('auth-err').textContent = msg || '';
  }

  function applyRemoteState(data) {
    if (!data || !data.state) return;
    var remoteTs = data.updatedAt || 0;
    var localTs  = parseInt(localStorage.getItem('_fbts') || '0');
    if (remoteTs < localTs) return; // only skip if remote is strictly older
    try {
      var parsed = JSON.parse(data.state);
      if (typeof S !== 'undefined') {
        var currentTab = S.tab; // keep local tab, don't let remote override it
        S = parsed;
        S.tab = currentTab;
        localStorage.setItem('asiatrip26v3', data.state);
        localStorage.setItem('_fbts', remoteTs.toString());
        if (appShown && typeof renderAll === 'function') renderAll();
      }
    } catch(e) {}
  }

  window._fbSave = function() {
    if (!db) return;
    var ts = Date.now();
    localStorage.setItem('_fbts', ts.toString());
    try {
      // Strip tab from synced state so each device keeps its own active tab
      var stateToSync = JSON.parse(localStorage.getItem('asiatrip26v3') || '{}');
      delete stateToSync.tab;
      db.collection('trips').doc('asia2026').set({
        state: JSON.stringify(stateToSync),
        updatedAt: ts
      });
    } catch(e) {}
  };

  var _firestoreInit = false;
  function initFirestore() {
    if (_firestoreInit) return;
    _firestoreInit = true;
    try {
      db = firebase.firestore();
      // No enablePersistence - it breaks real-time onSnapshot updates
      db.collection('trips').doc('asia2026').get().then(function(doc) {
        if (doc.exists) { applyRemoteState(doc.data()); }
        else { window._fbSave(); }
      }).catch(function(){});
      db.collection('trips').doc('asia2026').onSnapshot(function(doc) {
        if (!doc.exists || doc.metadata.hasPendingWrites) return;
        applyRemoteState(doc.data());
      }, function(){});
    } catch(e) {}
  }

  function initAuth() {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FB_CONF);

      // ── OFFLINE-FIRST: show app immediately if cached email is allowed ──
      var cachedEmail = localStorage.getItem(AUTH_KEY);
      if (cachedEmail && isAllowed(cachedEmail)) {
        showApp(); // show immediately for offline-first
        // DO NOT init Firestore here - no auth token yet
        // onAuthStateChanged will fire shortly and init Firestore with valid token
      }

      // Handle redirect result (called after Google redirects back)
      firebase.auth().getRedirectResult().then(function(result) {
        // handled by onAuthStateChanged below
      }).catch(function() {
        document.getElementById('auth-loading').textContent = '';
        document.getElementById('auth-err').textContent = 'Sign-in failed. Try again.';
      });

      // Sign-in button
      document.getElementById('google-signin-btn').addEventListener('click', function() {
        document.getElementById('auth-loading').textContent = 'Signing in...';
        document.getElementById('auth-err').textContent = '';
        var provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithRedirect(provider).catch(function() {
          document.getElementById('auth-loading').textContent = '';
          document.getElementById('auth-err').textContent = 'Sign-in failed. Try again.';
        });
      });

      // Auth state listener — runs when online
      firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
          var email = (user.email || '').toLowerCase();
          if (isAllowed(email)) {
            localStorage.setItem(AUTH_KEY, email); // cache for offline
            document.getElementById('auth-loading').textContent = '';
            initFirestore(); // always init/re-init Firestore once we have a valid auth token
            if (!appShown) { showApp(); }
          } else {
            localStorage.removeItem(AUTH_KEY);
            firebase.auth().signOut();
            showAuth('Access denied. This account is not authorised.');
          }
        } else {
          // No Firebase session — but if we have a valid cached email, stay shown
          var cached = localStorage.getItem(AUTH_KEY);
          if (!cached || !isAllowed(cached)) {
            showAuth();
          }
          // else: offline + cached email = stay in app
        }
      });

    } catch(e) { console.warn('Auth init error:', e); showAuth(); }
  }

  function waitAndInit(n) {
    if (typeof firebase !== 'undefined' &&
        typeof firebase.auth === 'function' &&
        typeof firebase.firestore === 'function') {
      initAuth();
    } else if (n > 0) {
      setTimeout(function(){waitAndInit(n-1);}, 300);
    }
  }
  setTimeout(function(){waitAndInit(20);}, 300);
})();
</script>
